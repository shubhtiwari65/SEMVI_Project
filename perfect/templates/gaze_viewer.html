<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CopyEmotion 2x2</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --bg:     #080b10; --accent: #00ff88; --acc2:   #00c8ff;
  --text:   #e8edf2; --muted:  #5a6472; --danger: #ff4466; --warn: #ffaa00;
  --border: rgba(255,255,255,.06);
}
html,body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; overflow:hidden; user-select:none; }
.screen { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity .45s ease; }
.screen.on { opacity:1; pointer-events:all; }

/* ════ START SCREEN ════ */
#S0 { flex-direction:column; background:var(--bg); }
#S0::before { content:''; position:absolute; inset:0; pointer-events:none; background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px); background-size:58px 58px; animation:gridMove 22s linear infinite; }
@keyframes gridMove { to { background-position:58px 58px; } }
.orb { position:absolute; border-radius:50%; filter:blur(90px); pointer-events:none; animation:orbP 8s ease-in-out infinite alternate; }
.o1  { width:500px;height:500px; background:rgba(0,255,136,.07); top:-150px;left:-150px; }
.o2  { width:380px;height:380px; background:rgba(0,200,255,.07); bottom:-100px;right:-100px; animation-delay:3s; }
@keyframes orbP { from{opacity:.25} to{opacity:.85} }

.si { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:28px; animation:fadeUp .85s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
.btn-go { padding:16px 62px; font-family:'Syne',sans-serif; font-size:15px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:#080b10; background:var(--accent); border:none; border-radius:3px; cursor:pointer; box-shadow:0 0 50px rgba(0,255,136,.28); transition:transform .15s,box-shadow .15s; }
.btn-go:hover { transform:translateY(-2px); box-shadow:0 0 70px rgba(0,255,136,.45); }

/* ════ 2x2 GRID LAYOUT ════ */
#S1 { background:#000; }
.grid-container {
  position: fixed; inset: 0; padding-top: 54px; 
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 4px;
  background: #111;
  z-index: 1;
}

.image-cell {
  position: relative;
  background-size: cover;
  background-position: center;
  border: 4px solid transparent;
  transition: border-color 0.1s ease, transform 0.1s ease;
  opacity: 0;
}
.image-cell.loaded { opacity: 1; }

.image-cell.active-gaze {
  border-color: var(--accent);
  box-shadow: inset 0 0 120px rgba(0,255,136,.2);
  z-index: 2;
  transform: scale(1.01);
}

/* UI Bars */
.top-bar { position:fixed; top:0; left:0; right:0; height:54px; display:flex; align-items:center; justify-content:space-between; padding:0 20px; background:linear-gradient(180deg,rgba(0,0,0,.9),transparent); z-index:20; gap:10px; }
.top-logo { font-family:'Syne',sans-serif; font-size:12px; font-weight:700; letter-spacing:.22em; color:var(--accent); text-transform:uppercase; }
.top-center { display:flex; align-items:center; gap:8px; }
.gaze-pill { font-size:10px; letter-spacing:.14em; padding:4px 14px; border-radius:2px; border:1px solid var(--accent); color:var(--accent); background:rgba(0,255,136,.07); min-width:130px; text-align:center; }
.gaze-pill.blink { border-color:var(--danger); color:var(--danger); }
.emo-pill { display:flex; gap:6px; padding:4px 12px; border-radius:2px; border:1px solid rgba(255,255,255,.12); font-size:10px; }
.top-right { display:flex; gap:8px; }
.btn-sm { padding:4px 12px; font-size:10px; border:1px solid rgba(255,255,255,.12); color:var(--muted); background:transparent; cursor:pointer; border-radius: 4px;}
.btn-sm:hover { border-color:var(--acc2); color:var(--acc2); }
.bot-bar { position:fixed; bottom:0; left:0; right:0; height:68px; display:flex; align-items:center; justify-content:center; gap:14px; background:linear-gradient(0deg,rgba(0,0,0,.92),transparent); z-index:20; }
.btn-nav { padding:10px 36px; font-size:12px; border:1px solid rgba(255,255,255,.1); color:var(--muted); background:transparent; cursor:pointer; border-radius: 4px;}
.btn-nav:hover { color:var(--text); background:rgba(255,255,255,.04); }
.btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

/* Calibration */
#calibOverlay { position:fixed; inset:0; z-index:100; display:none; flex-direction:column; align-items:center; justify-content:center; gap:20px; background:rgba(0,0,0,.88); }
#calibOverlay.show { display:flex; }
.calib-title { font-size:48px; color:var(--accent); font-weight:bold; font-family:'Syne',sans-serif; letter-spacing: 0.1em;}
.calib-steps { display:flex; gap:12px; }
.calib-step-dot { width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,.15); }
.calib-step-dot.active { background:var(--acc2); transform:scale(1.3); }
.calib-step-dot.done { background:var(--accent); }
.calib-arrow { font-size:64px; }
.calib-bar-wrap { width:500px; height:8px; background:rgba(255,255,255,.08); border-radius: 4px;}
.calib-bar { height:100%; width:0%; background:var(--accent); transition:width .1s; border-radius: 4px;}

/* Report */
#S2 { background:var(--bg); padding:60px 80px; overflow-y:auto; flex-direction:column; align-items:flex-start; justify-content: flex-start;}
.btn-restart { margin-top:20px; padding:10px 20px; background:var(--danger); color:#fff; border:none; cursor:pointer; font-weight:bold; border-radius: 4px;}
</style>
</head>
<body>

<div id="S0" class="screen on">
  <div class="orb o1"></div><div class="orb o2"></div>
  <div class="si">
    <h1 style="color:var(--accent); font-size:48px; font-family:'Syne',sans-serif;">CopyEmotion 2x2</h1>
    <p style="color:var(--muted)">Grid Analytics & Blink Tracking</p>
    <button class="btn-go" onclick="startViewer()">START SESSION</button>
  </div>
</div>

<div id="S1" class="screen">
  <div class="grid-container">
    <div class="image-cell" id="cell-TOP_LEFT"></div>
    <div class="image-cell" id="cell-TOP_RIGHT"></div>
    <div class="image-cell" id="cell-BOT_LEFT"></div>
    <div class="image-cell" id="cell-BOT_RIGHT"></div>
  </div>

  <div class="top-bar">
    <div class="top-logo">CopyEmotion</div>
    <div class="top-center">
      <div class="gaze-pill" id="pill">GAZE: —</div>
      <div class="gaze-pill" id="blinkPill" style="border-color:var(--acc2); color:var(--acc2);">BLINKS: 0</div>
      <div class="emo-pill"><span id="emoLabel">waiting...</span></div>
    </div>
    <div class="top-right">
      <button class="btn-sm" id="calibBtn" onclick="startCalib()">⊕ Calibrate</button>
      <button class="btn-sm" onclick="showReport()">⊟ Stop & Report</button>
    </div>
  </div>

  <div id="calibOverlay">
    <div class="calib-title" id="calTitle">CALIBRATING</div>
    <div class="calib-steps" id="calDots">
      <div class="calib-step-dot" id="dot0"></div><div class="calib-step-dot" id="dot1"></div>
      <div class="calib-step-dot" id="dot2"></div><div class="calib-step-dot" id="dot3"></div>
      <div class="calib-step-dot" id="dot4"></div>
    </div>
    <div class="calib-arrow" id="calArrow">👁️</div>
    <div id="calInstruction" style="color:white; margin-top:20px; font-family: monospace; letter-spacing: 0.1em;">Look Center</div>
    <div class="calib-bar-wrap"><div class="calib-bar" id="calibBar"></div></div>
  </div>

  <div class="bot-bar">
    <button class="btn-nav" id="bPrev" onclick="nav(-4)">← Prev Page</button>
    <button class="btn-nav" id="bNext" onclick="nav(4)">Next Page →</button>
  </div>
</div>

<div id="S2" class="screen">
  <div style="width: 100%; max-width: 1000px; margin: 0 auto;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
          <h2 style="color:var(--text); font-size:32px; font-family:'Syne',sans-serif; margin: 0;">Session Results</h2>
          <button class="btn-restart" onclick="location.reload()">Close</button>
      </div>
      <div id="reportBody">
          </div>
  </div>
</div>

<script>
let IMAGES = [];
let IMAGE_NAMES = [];
let IMAGE_EMOTIONS = {{ image_emotions | tojson }};
let curPageIdx = 0;
let sse = null;
let blinkInterval = null;

// 2x2 Mapping variables
const CELL_IDS = ["TOP_LEFT", "TOP_RIGHT", "BOT_LEFT", "BOT_RIGHT"];
let sessionData = {}; // Track dwell time per image
let lastActiveCell = null;
let lastActiveTime = Date.now();

// ── CROSS CALIBRATION PATTERN ──
const STEP_CONFIG = [
  { arrow: '👁️', instruction: 'Look CENTER' },
  { arrow: '👈', instruction: 'Look LEFT' },
  { arrow: '👉', instruction: 'Look RIGHT' },
  { arrow: '👆', instruction: 'Look UP' },
  { arrow: '👇', instruction: 'Look DOWN' },
];

window.addEventListener('DOMContentLoaded', async () => {
  const r = await fetch('/images');
  const j = await r.json();
  IMAGE_NAMES = j.images;
  IMAGES = j.images.map(f => `/static/images/${f}`);
  j.images.forEach(f => sessionData[f] = { timeMs: 0 });
});

function connectSSE() {
  if (sse) sse.close();
  sse = new EventSource('/gaze/stream');
  sse.onmessage = e => handleGaze(e.data.trim());
}

function handleGaze(gazeStr) {
  const pill = document.getElementById('pill');
  pill.textContent = 'GAZE: ' + gazeStr;
  
  if (gazeStr === 'BLINK') {
    pill.className = 'gaze-pill blink';
    return; 
  }
  pill.className = 'gaze-pill';

  CELL_IDS.forEach(id => document.getElementById(`cell-${id}`).classList.remove('active-gaze'));
  
  if (CELL_IDS.includes(gazeStr)) {
    document.getElementById(`cell-${gazeStr}`).classList.add('active-gaze');
    
    if (lastActiveCell !== gazeStr) {
        recordDwellTime();
        lastActiveCell = gazeStr;
        lastActiveTime = Date.now();
    }
  } else {
      recordDwellTime();
      lastActiveCell = null;
  }
}

function recordDwellTime() {
    if (lastActiveCell && sessionData[lastActiveCell]) {
        sessionData[lastActiveCell].timeMs += (Date.now() - lastActiveTime);
    }
}

async function startViewer() {
  await fetch('/camera/start', { method:'POST' });
  document.getElementById('S0').classList.remove('on');
  document.getElementById('S1').classList.add('on');
  connectSSE();
  
  setInterval(async () => {
      try {
          const e = await (await fetch('/emotion')).json();
          document.getElementById('emoLabel').textContent = e.emotion;
      } catch(e) {}
  }, 1000);
  
  blinkInterval = setInterval(async () => {
      try {
          const b = await (await fetch('/blinks')).json();
          document.getElementById('blinkPill').textContent = "BLINKS: " + b.blinks;
      } catch(e) {}
  }, 1000);

  loadPage(0);
}

function loadPage(startIdx) {
  curPageIdx = startIdx;
  lastActiveCell = null; 
  
  for(let i=0; i<4; i++) {
      const cell = document.getElementById(`cell-${CELL_IDS[i]}`);
      const imgIdx = startIdx + i;
      if (imgIdx < IMAGES.length) {
          cell.style.backgroundImage = `url("${IMAGES[imgIdx]}")`;
          cell.classList.add('loaded');
          sessionData[CELL_IDS[i]] = sessionData[IMAGE_NAMES[imgIdx]]; 
      } else {
          cell.style.backgroundImage = 'none';
          cell.classList.remove('loaded');
          sessionData[CELL_IDS[i]] = null;
      }
  }
  document.getElementById('bPrev').disabled = curPageIdx === 0;
  document.getElementById('bNext').disabled = curPageIdx + 4 >= IMAGES.length;
}

function nav(direction) {
  recordDwellTime();
  loadPage(curPageIdx + direction);
}

// 5-Step Calibration Logic
async function startCalib() {
  await fetch('/calibrate', { method:'POST' });
  document.getElementById('calibOverlay').classList.add('show');
  
  const timer = setInterval(async () => {
    try {
        const s = await (await fetch('/calibrate/status')).json();
        if (s.active) {
          document.getElementById('calInstruction').textContent = STEP_CONFIG[s.step].instruction;
          document.getElementById('calArrow').textContent = STEP_CONFIG[s.step].arrow;
          document.getElementById('calibBar').style.width = Math.round(s.frac * 100) + '%';
          for(let i=0; i<5; i++) document.getElementById('dot'+i).className = 'calib-step-dot' + (i<s.step ? ' done' : i===s.step ? ' active' : '');
        }
        if (s.done) {
          clearInterval(timer);
          document.getElementById('calibOverlay').classList.remove('show');
        }
    } catch(e) {}
  }, 100);
}

async function showReport() {
    recordDwellTime();
    
    document.getElementById('S1').classList.remove('on');
    document.getElementById('S2').classList.add('on');
    document.getElementById('reportBody').innerHTML = "<div style='color: var(--muted);'>Generating Analytics...</div>";
    
    // Call backend to stop tracking and generate plots
    const response = await fetch('/api/stop_session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(sessionData)
    });
    const data = await response.json();
    
    // Render the Final Layout exactly like your screenshots
    let html = `<pre style="background: #111; padding: 20px; border-radius: 8px; font-family: monospace; color: #e8edf2; white-space: pre-wrap; font-size: 13px; max-height: 400px; overflow-y: auto;">${JSON.stringify(data.summary, null, 2)}</pre>`;
    
    html += `<div style="display: flex; gap: 20px; margin-top: 20px; width: 100%;">`;
    if (data.heatmap) html += `<img src="/static/${data.heatmap}" style="width: 48%; border-radius: 8px; object-fit: contain; background: white;">`;
    if (data.scatter) html += `<img src="/static/${data.scatter}" style="width: 48%; border-radius: 8px; object-fit: contain; background: white;">`;
    html += `</div>`;
    
    document.getElementById('reportBody').innerHTML = html;
}
</script>
</body>
</html>
