<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Eye Tracking Project</title>
    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
    <style>
        body { 
            margin: 0; padding: 0; 
            font-family: sans-serif;
            background-color: #222; color: white;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }

        /* --- GALLERY CONTAINER --- */
        #gallery-container {
            position: relative;
            width: 80vw; height: 70vh;
            background-color: black;
            border: 2px solid #555;
            display: flex; justify-content: center; align-items: center;
        }

        #current-image {
            max-width: 100%; max-height: 100%;
            object-fit: contain;
        }

        /* --- RED POINTER --- */
        #gaze-dot {
            position: fixed;
            top: 50%; left: 50%;
            width: 25px; height: 25px;
            background-color: red;
            border: 2px solid white;
            border-radius: 50%;
            pointer-events: none; /* Allows clicking through it */
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: top 0.1s ease-out, left 0.1s ease-out;
        }

        /* --- BLINK DISPLAY --- */
        #blink-display {
            font-size: 40px; font-weight: bold; margin-bottom: 10px;
        }
        
        #controls { margin-top: 15px; display: flex; gap: 20px; }
        
        button {
            padding: 10px 20px; font-size: 18px; cursor: pointer;
            background: #444; color: white; border: none; border-radius: 4px;
        }
        button:hover { background: #666; }

        /* Status indicator for connection */
        #status { position: absolute; top: 10px; right: 10px; font-size: 12px; color: grey; }
    </style>
</head>
<body>

    <div id="status">Disconnected</div>
    <div id="blink-display">Blinks: 0</div>
    <div id="gaze-dot"></div>

    <div id="gallery-container">
        <img id="current-image" src="" alt="Loading...">
    </div>

    <div id="controls">
        <button onclick="changeImage(-1)">Previous</button>
        <button onclick="changeImage(1)">Next</button>
    </div>

    <script>
        // --- 1. IMAGE LIST (Must match your 'static' folder files) ---
        const images = [
            "/static/image1.jpg", 
            "/static/image2.jpg", 
            "/static/image3.jpg",
            "/static/image4.jpg",
            "/static/image5.jpg"
        ];
        
        let currentIndex = 0;
        const imgElement = document.getElementById('current-image');

        function updateImage() {
            imgElement.src = images[currentIndex];
        }
        
        function changeImage(direction) {
            currentIndex += direction;
            if (currentIndex < 0) currentIndex = images.length - 1;
            if (currentIndex >= images.length) currentIndex = 0;
            updateImage();
        }
        updateImage();

        // --- 2. SOCKET IO CONNECTION ---
        const socket = io();
        const dot = document.getElementById('gaze-dot');
        const blinkLabel = document.getElementById('blink-display');
        const statusLabel = document.getElementById('status');

        socket.on('connect', () => {
            statusLabel.innerText = "Connected";
            statusLabel.style.color = "lime";
        });

        // Move Red Dot
        socket.on('gaze_update', (data) => {
            const x = data.x * window.innerWidth;
            const y = data.y * window.innerHeight;
            dot.style.left = x + "px";
            dot.style.top = y + "px";
        });

        // Update Blink Count
        socket.on('blink_update', (data) => {
            blinkLabel.innerText = "Blinks: " + data.count;
            // Flash effect
            blinkLabel.style.color = "lime";
            setTimeout(() => blinkLabel.style.color = "white", 200);
        });
    </script>
</body>
</html>
